<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FDS AI — Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#060b18;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
.bg-grid{background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:48px 48px}
.glass{background:rgba(13,20,36,.78);backdrop-filter:blur(18px);border:1px solid rgba(0,212,255,.15);border-radius:16px}
.glass-nav{background:rgba(10,15,30,.94);backdrop-filter:blur(24px);border-bottom:1px solid rgba(0,212,255,.1)}
.nav-dot{width:10px;height:10px;border-radius:50%;background:#00d4ff;display:inline-block;position:relative}
.nav-dot::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,212,255,.5);animation:pulse-ring 2s ease-out infinite}
@keyframes pulse-ring{0%{transform:translate(-50%,-50%) scale(.8);opacity:1}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:rgba(0,102,255,.07);top:-150px;right:-100px;animation:float 9s ease-in-out infinite}
.orb-2{width:350px;height:350px;background:rgba(124,58,237,.06);bottom:0;left:-80px;animation:float 12s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.scanline{position:fixed;left:0;right:0;height:2px;top:-2px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.25),transparent);animation:scan 10s linear infinite;pointer-events:none;z-index:999}
@keyframes scan{0%{top:-2px}100%{top:100vh}}
.content-layer{position:relative;z-index:1}
.gradient-text{background:linear-gradient(135deg,#00d4ff,#0066ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* Avatar */
.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,rgba(0,80,255,.4),rgba(0,212,255,.3));border:2px solid rgba(0,212,255,.4);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#00d4ff;font-family:'Space Grotesk',sans-serif;box-shadow:0 0 30px rgba(0,212,255,.2)}
/* Stat card */
.stat-card{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.12);border-radius:14px;padding:1.2rem 1.5rem;text-align:center;transition:all .25s ease}
.stat-card:hover{border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.1);transform:translateY(-3px)}
.stat-num{font-size:1.8rem;font-weight:700;color:#00d4ff;font-family:'Courier New',monospace;line-height:1}
.stat-label{font-size:.7rem;color:#64748b;margin-top:.3rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
/* Form */
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.7rem;font-weight:600;color:#64748b;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem}
.input-wrap{position:relative}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#334155;transition:color .3s;pointer-events:none;display:flex;align-items:center}
.field-input{width:100%;padding:.8rem 1rem .8rem 2.6rem;background:rgba(5,10,22,.8);border:1px solid rgba(0,212,255,.14);border-radius:11px;color:#e2e8f0;font-size:.88rem;font-family:'Inter',sans-serif;outline:none;transition:all .3s ease}
.field-input::placeholder{color:#1e293b}
.field-input:focus{border-color:rgba(0,212,255,.55);background:rgba(0,212,255,.03);box-shadow:0 0 0 3px rgba(0,212,255,.08)}
.input-wrap:focus-within .input-icon{color:#00d4ff}
.field-input:disabled{opacity:.5;cursor:not-allowed}
.pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:#334155;cursor:pointer;transition:color .2s;background:none;border:none;padding:0;display:flex;align-items:center}
.pw-toggle:hover{color:#00d4ff}
.btn-primary{background:linear-gradient(135deg,#0050dd,#00aaff);border:none;border-radius:11px;color:#fff;font-size:.88rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s ease;box-shadow:0 4px 20px rgba(0,100,255,.25)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,150,255,.4)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{border-radius:10px;padding:.65rem 1rem;font-size:.78rem;margin-bottom:1rem;display:none;align-items:center;gap:.5rem;animation:alertIn .3s ease}
@keyframes alertIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:flex}
.alert.success{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);color:#6ee7b7;display:flex}
.hint{font-size:.67rem;color:#334155;margin-top:.3rem}
.hint.valid{color:#00c96a}.hint.invalid{color:#f87171}
.strength-bar{display:flex;gap:3px;margin-top:.4rem}
.strength-seg{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.07);transition:background .4s}
.strength-seg.weak{background:#ef4444}.strength-seg.medium{background:#f59e0b}.strength-seg.strong{background:#00ff88}
.skeleton{background:linear-gradient(90deg,rgba(0,212,255,.05) 25%,rgba(0,212,255,.1) 50%,rgba(0,212,255,.05) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,.28);border-radius:3px}
</style>
</head>
<body class="bg-grid">
<div class="orb orb-1"></div><div class="orb orb-2"></div>
<div class="scanline"></div>

<!-- Nav -->
<nav class="glass-nav fixed top-0 left-0 right-0 z-50 px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="nav-dot"></span>
    <a href="/" class="text-sm font-bold tracking-widest text-cyan-400 uppercase hover:text-cyan-300 transition-colors">FDS AI</a>
    <span class="text-xs text-slate-600">/ Profile</span>
  </div>
  <div class="flex items-center gap-3">
    <a href="/" class="text-xs text-slate-500 hover:text-cyan-400 transition-colors border border-slate-700 hover:border-cyan-500/40 px-2 py-1 rounded-lg flex items-center gap-1">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Research
    </a>
    <a href="/history" class="text-xs text-slate-500 hover:text-cyan-400 transition-colors border border-slate-700 hover:border-cyan-500/40 px-2 py-1 rounded-lg flex items-center gap-1">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      History
    </a>
    <button onclick="logout()" class="text-xs text-slate-500 hover:text-red-400 transition-colors border border-slate-700 hover:border-red-500/40 px-2 py-1 rounded-lg flex items-center gap-1">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>
</nav>

<div class="content-layer pt-20 pb-16 px-4 max-w-3xl mx-auto">

  <!-- Profile header -->
  <div class="glass p-6 mb-6 flex items-center gap-5 flex-wrap">
    <div class="avatar" id="avatarEl">?</div>
    <div class="flex-1">
      <div id="profileName" class="skeleton h-6 w-40 mb-2"></div>
      <div id="profileEmail" class="skeleton h-4 w-56"></div>
      <div id="profileJoined" class="text-xs text-slate-600 mt-1 hidden"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="stat-card">
      <div class="stat-num" id="statReports">—</div>
      <div class="stat-label">Reports</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statSectors">12</div>
      <div class="stat-label">Sectors</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statDays">—</div>
      <div class="stat-label">Days Active</div>
    </div>
  </div>

  <!-- Change Password -->
  <div class="glass p-6">
    <div class="flex items-center gap-2 mb-5">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span class="text-cyan-400 text-sm font-semibold tracking-wide">CHANGE PASSWORD</span>
    </div>

    <div class="alert" id="pwAlert">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="pwAlertMsg"></span>
    </div>

    <form onsubmit="handleChangePassword(event)" novalidate>
      <div class="field">
        <label>Current Password</label>
        <div class="input-wrap">
          <input type="password" id="currentPw" class="field-input" placeholder="Your current password" autocomplete="current-password"/>
          <span class="input-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <button type="button" class="pw-toggle" onclick="togglePw('currentPw','eye1')"><svg id="eye1" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div class="field">
        <label>New Password</label>
        <div class="input-wrap">
          <input type="password" id="newPw" class="field-input" placeholder="New password" autocomplete="new-password" oninput="validateNewPw()"/>
          <span class="input-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <button type="button" class="pw-toggle" onclick="togglePw('newPw','eye2')"><svg id="eye2" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="strength-bar"><div class="strength-seg" id="ps1"></div><div class="strength-seg" id="ps2"></div><div class="strength-seg" id="ps3"></div><div class="strength-seg" id="ps4"></div></div>
        <div class="hint" id="newPwHint"></div>
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <div class="input-wrap">
          <input type="password" id="confirmPw" class="field-input" placeholder="Confirm new password" autocomplete="new-password" oninput="validateConfirm()"/>
          <span class="input-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        </div>
        <div class="hint" id="confirmHint"></div>
      </div>
      <button type="submit" class="btn-primary w-full py-3 mt-1" id="changePwBtn">
        <span id="changePwText">Update Password</span>
        <div class="btn-spinner" id="changePwSpinner"></div>
      </button>
    </form>
  </div>

</div>

<script>
(function(){ if(!localStorage.getItem('fintel_token')){ window.location.href='/login'; } })();

function authHeaders(){ return {'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem('fintel_token')||'')}; }

async function logout(){
  try{ await fetch('/api/logout',{method:'POST',headers:authHeaders(),credentials:'include'}); }catch(e){}
  localStorage.clear(); window.location.href='/login';
}

async function loadProfile(){
  try{
    const res = await fetch('/api/profile',{headers:authHeaders(),credentials:'include'});
    if(res.status===401){window.location.href='/login';return;}
    const d = await res.json();
    const initials = (d.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('avatarEl').textContent = initials;
    document.getElementById('profileName').outerHTML = '<div class="text-xl font-bold text-slate-100" id="profileName">'+d.name+'</div>';
    document.getElementById('profileEmail').outerHTML = '<div class="text-sm text-slate-400" id="profileEmail">'+d.email+'</div>';
    const joined = document.getElementById('profileJoined');
    if(d.joined){ joined.textContent = 'Member since '+d.joined; joined.classList.remove('hidden'); }
    document.getElementById('statReports').textContent = d.report_count;
    // Days active
    if(d.joined){
      try{
        const diff = Math.floor((Date.now()-new Date(d.joined).getTime())/(1000*60*60*24));
        document.getElementById('statDays').textContent = Math.max(1,diff);
      }catch(e){ document.getElementById('statDays').textContent = '1'; }
    }
  }catch(e){ console.error(e); }
}

function isValidPassword(v){ return v.length>=6&&/^[A-Z]/.test(v)&&/[^a-zA-Z0-9]/.test(v); }
function pwStrength(v){ var s=0; if(v.length>=6)s++; if(v.length>=10)s++; if(/[^a-zA-Z0-9]/.test(v))s++; if(/[0-9]/.test(v)&&/[A-Z]/.test(v)&&/[a-z]/.test(v))s++; return s; }

function validateNewPw(){
  var v=document.getElementById('newPw').value;
  var h=document.getElementById('newPwHint');
  var score=pwStrength(v);
  var cls=score<=1?'weak':score<=2?'medium':'strong';
  for(var i=1;i<=4;i++){ document.getElementById('ps'+i).className='strength-seg'+(i<=score?' '+cls:''); }
  if(!v){h.textContent='';h.className='hint';return;}
  if(!/^[A-Z]/.test(v)){h.textContent='✗ Must start with a capital letter';h.className='hint invalid';}
  else if(!/[^a-zA-Z0-9]/.test(v)){h.textContent='✗ Must contain a special character';h.className='hint invalid';}
  else if(v.length<6){h.textContent='✗ Too short (min 6 chars)';h.className='hint invalid';}
  else{h.textContent='✓ Password format valid';h.className='hint valid';}
}

function validateConfirm(){
  var v=document.getElementById('confirmPw').value;
  var nv=document.getElementById('newPw').value;
  var h=document.getElementById('confirmHint');
  if(!v){h.textContent='';h.className='hint';return;}
  if(v===nv){h.textContent='✓ Passwords match';h.className='hint valid';}
  else{h.textContent='✗ Passwords do not match';h.className='hint invalid';}
}

function togglePw(inputId,iconId){
  var inp=document.getElementById(inputId);
  var icon=document.getElementById(iconId);
  if(inp.type==='password'){inp.type='text';icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';}
  else{inp.type='password';icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}
}

function showAlert(msg,type){ var b=document.getElementById('pwAlert'); document.getElementById('pwAlertMsg').textContent=msg; b.className='alert '+type; }
function hideAlert(){ document.getElementById('pwAlert').className='alert'; }

async function handleChangePassword(e){
  e.preventDefault(); hideAlert();
  var cur=document.getElementById('currentPw').value;
  var nw=document.getElementById('newPw').value;
  var conf=document.getElementById('confirmPw').value;
  if(!cur){showAlert('Please enter your current password.','error');return;}
  if(!isValidPassword(nw)){showAlert('New password must start with a capital letter and contain a special character.','error');return;}
  if(nw!==conf){showAlert('New passwords do not match.','error');return;}
  var btn=document.getElementById('changePwBtn');
  btn.disabled=true;
  document.getElementById('changePwText').style.display='none';
  document.getElementById('changePwSpinner').style.display='block';
  try{
    var res=await fetch('/api/change-password',{method:'POST',headers:authHeaders(),credentials:'include',body:JSON.stringify({current_password:cur,new_password:nw})});
    var data=await res.json();
    if(!res.ok){showAlert(data.detail||'Failed to change password.','error');return;}
    showAlert('Password updated successfully!','success');
    document.getElementById('currentPw').value='';
    document.getElementById('newPw').value='';
    document.getElementById('confirmPw').value='';
    for(var i=1;i<=4;i++) document.getElementById('ps'+i).className='strength-seg';
    document.getElementById('newPwHint').textContent='';
    document.getElementById('confirmHint').textContent='';
  }catch(err){showAlert('Cannot reach the server.','error');}
  finally{
    btn.disabled=false;
    document.getElementById('changePwText').style.display='block';
    document.getElementById('changePwSpinner').style.display='none';
  }
}

loadProfile();
</script>
</body>
</html>
