<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FDS AI — Activity Log</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#060b18;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
body.light{background:#f0f4ff;color:#1e293b}
.bg-grid{background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:48px 48px}
body.light .bg-grid{background-image:linear-gradient(rgba(0,100,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,100,255,.05) 1px,transparent 1px)}
.glass{background:rgba(13,20,36,.78);backdrop-filter:blur(18px);border:1px solid rgba(0,212,255,.15);border-radius:16px}
body.light .glass{background:rgba(255,255,255,.85);border-color:rgba(0,100,255,.15)}
.glass-nav{background:rgba(10,15,30,.94);backdrop-filter:blur(24px);border-bottom:1px solid rgba(0,212,255,.1)}
body.light .glass-nav{background:rgba(255,255,255,.95);border-bottom-color:rgba(0,100,255,.1)}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:rgba(0,102,255,.07);top:-150px;right:-100px;animation:float 9s ease-in-out infinite}
.orb-2{width:350px;height:350px;background:rgba(124,58,237,.06);bottom:0;left:-80px;animation:float 12s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.scanline{position:fixed;left:0;right:0;height:2px;top:-2px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.25),transparent);animation:scan 10s linear infinite;pointer-events:none;z-index:999}
@keyframes scan{0%{top:-2px}100%{top:100vh}}
.content-layer{position:relative;z-index:1}
.gradient-text{background:linear-gradient(135deg,#00d4ff,#0066ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-dot{width:10px;height:10px;border-radius:50%;background:#00d4ff;display:inline-block;position:relative}
.nav-dot::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,212,255,.5);animation:pulse-ring 2s ease-out infinite}
@keyframes pulse-ring{0%{transform:translate(-50%,-50%) scale(.8);opacity:1}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}
/* Timeline */
.timeline-item{position:relative;padding-left:2rem;padding-bottom:1.5rem}
.timeline-item::before{content:'';position:absolute;left:.45rem;top:1.2rem;bottom:0;width:1px;background:rgba(0,212,255,.15)}
.timeline-item:last-child::before{display:none}
.timeline-dot{position:absolute;left:0;top:.35rem;width:.9rem;height:.9rem;border-radius:50%;border:2px solid rgba(0,212,255,.4);background:#060b18;display:flex;align-items:center;justify-content:center}
body.light .timeline-dot{background:#f0f4ff}
.timeline-dot.research{border-color:#00d4ff;background:rgba(0,212,255,.15)}
.timeline-card{background:rgba(8,12,24,.7);border:1px solid rgba(0,212,255,.1);border-radius:12px;padding:.85rem 1rem;transition:all .2s}
body.light .timeline-card{background:rgba(255,255,255,.7);border-color:rgba(0,100,255,.12)}
.timeline-card:hover{border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.04)}
.sector-pill{display:inline-flex;align-items:center;padding:.15rem .55rem;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.05em;background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.25)}
.skeleton{background:linear-gradient(90deg,rgba(0,212,255,.05) 25%,rgba(0,212,255,.1) 50%,rgba(0,212,255,.05) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
/* Theme toggle */
.theme-toggle{cursor:pointer;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:20px;padding:.3rem .75rem;font-size:.75rem;color:#64748b;transition:all .2s;display:flex;align-items:center;gap:.4rem}
.theme-toggle:hover{border-color:rgba(0,212,255,.4);color:#00d4ff}
body.light .theme-toggle{background:rgba(0,100,255,.08);border-color:rgba(0,100,255,.2);color:#475569}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}::-webkit-scrollbar-thumb{background:rgba(0,212,255,.28);border-radius:3px}
</style>
</head>
<body class="bg-grid">
<div class="orb orb-1"></div><div class="orb orb-2"></div>
<div class="scanline"></div>

<nav class="glass-nav fixed top-0 left-0 right-0 z-50 px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="nav-dot"></span>
    <a href="/" class="text-sm font-bold tracking-widest text-cyan-400 uppercase hover:text-cyan-300 transition-colors">FDS AI</a>
    <span class="text-xs text-slate-600">/ Activity Log</span>
  </div>
  <div class="flex items-center gap-3">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
    <a href="/" class="text-xs text-slate-500 hover:text-cyan-400 transition-colors border border-slate-700 hover:border-cyan-500/40 px-2 py-1 rounded-lg">Research</a>
    <a href="/history" class="text-xs text-slate-500 hover:text-cyan-400 transition-colors border border-slate-700 hover:border-cyan-500/40 px-2 py-1 rounded-lg">History</a>
    <a href="/profile" class="text-xs text-slate-500 hover:text-cyan-400 transition-colors border border-slate-700 hover:border-cyan-500/40 px-2 py-1 rounded-lg">Profile</a>
    <button onclick="logout()" class="text-xs text-slate-500 hover:text-red-400 transition-colors border border-slate-700 hover:border-red-500/40 px-2 py-1 rounded-lg">Logout</button>
  </div>
</nav>

<div class="content-layer pt-20 pb-16 px-4 max-w-3xl mx-auto">
  <div class="mb-8">
    <h1 class="text-3xl font-bold gradient-text mb-2">Activity Log</h1>
    <p class="text-slate-500 text-sm">Your research timeline — every query you've run</p>
  </div>

  <div id="timeline" class="space-y-0">
    <div class="skeleton h-16 w-full mb-3 rounded-xl"></div>
    <div class="skeleton h-16 w-full mb-3 rounded-xl"></div>
    <div class="skeleton h-16 w-full rounded-xl"></div>
  </div>
  <div id="emptyState" class="hidden text-center py-20">
    <div class="text-5xl mb-4">🔍</div>
    <div class="text-slate-400 text-sm">No activity yet</div>
    <a href="/" class="inline-block mt-4 text-xs text-cyan-400 border border-cyan-500/30 px-4 py-2 rounded-lg hover:bg-cyan-500/10 transition-colors">Start Researching →</a>
  </div>
</div>

<script>
(function(){ if(!localStorage.getItem('fintel_token')){ window.location.href='/login'; } })();
// Theme
var theme = localStorage.getItem('fds_theme')||'dark';
if(theme==='light'){ document.body.classList.add('light'); document.getElementById('themeBtn').textContent='☀️ Light'; }
function toggleTheme(){
  theme = theme==='dark'?'light':'dark';
  document.body.classList.toggle('light', theme==='light');
  document.getElementById('themeBtn').textContent = theme==='light'?'☀️ Light':'🌙 Dark';
  localStorage.setItem('fds_theme',theme);
}
function authHeaders(){ return {'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem('fintel_token')||'')}; }
async function logout(){
  try{ await fetch('/api/logout',{method:'POST',headers:authHeaders(),credentials:'include'}); }catch(e){}
  localStorage.clear(); window.location.href='/login';
}
const SECTOR_COLORS = {IT:'#00d4ff',PHARMA:'#a78bfa',BANKING:'#00ff88',FINTECH:'#f59e0b',ENERGY:'#fb923c',AUTOMOTIVE:'#818cf8',FMCG:'#f472b6',TELECOM:'#2dd4bf',INFRASTRUCTURE:'#facc15',METALS:'#9ca3af',ECOMMERCE:'#f87171',HEALTHCARE:'#34d399'};
async function loadActivity(){
  try{
    var res = await fetch('/api/activity',{headers:authHeaders(),credentials:'include'});
    if(res.status===401){window.location.href='/login';return;}
    var data = await res.json();
    var log = data.activity||[];
    var tl = document.getElementById('timeline');
    tl.innerHTML='';
    if(log.length===0){ document.getElementById('emptyState').classList.remove('hidden'); return; }
    log.forEach(function(entry){
      var color = SECTOR_COLORS[(entry.sector||'').toUpperCase()]||'#00d4ff';
      var item = document.createElement('div');
      item.className='timeline-item';
      item.innerHTML=
        '<div class="timeline-dot research"></div>'+
        '<div class="timeline-card">'+
          '<div class="flex items-center gap-2 mb-1 flex-wrap">'+
            '<span class="sector-pill" style="background:'+color+'22;color:'+color+';border-color:'+color+'44">'+(entry.sector||'Research')+'</span>'+
            '<span class="text-xs text-slate-500">'+entry.timestamp+'</span>'+
          '</div>'+
          '<div class="text-sm text-slate-200">'+(entry.query||'Research query')+'</div>'+
        '</div>';
      tl.appendChild(item);
    });
  }catch(e){ document.getElementById('emptyState').classList.remove('hidden'); }
}
loadActivity();
</script>
</body>
</html>
